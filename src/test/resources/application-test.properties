# Banco de dados H2 em memória
spring.datasource.url=jdbc:h2:mem:quantivo_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS core
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=core

# Flyway desabilitado para testes
spring.flyway.enabled=false

# JWT
jwt.secret=aB3dE5fG7hJ9kL1mN2oP4qR6sT8uV0wX
jwt.expiration-hours=24

# Logging
logging.level.org.springframework=INFO
logging.level.com.example.quantivo=DEBUG
