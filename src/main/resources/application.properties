spring.application.name=quantivo

spring.profiles.active=@activatedProperties@
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.schemas=core
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:dev1secret1123456789012345678901234}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:3}

# JPA
spring.jpa.open-in-view=false

# Configuracao principal do SpringDoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs

# ===================================================================
# CONFIGURAÇÃO DE E-MAIL (Desenvolvimento com MailHog)
# MailHog é um servidor SMTP local que captura e-mails sem enviá-los.
# Acesse a caixa de entrada em: http://localhost:8025
# ===================================================================
spring.mail.host=localhost
spring.mail.port=1025
